<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4848 復活節彩蛋｜四月金錢測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ivory:     #FBF7F0;
  --parchment: #F5EAD8;
  --linen:     #EAD9C2;
  --blush-pale:#F5E6DE;
  --blush:     #E8C8BC;
  --rose-gold: #D4967A;
  --gold-line: #C9A86C;
  --gold:      #D4A855;
  --gold-deep: #B88A3A;
  --peach:     #E8A882;
  --text-dark: #3A2A1A;
  --text-mid:  #6A4E38;
  --text-soft: #9A7A62;
  --text-muted:#C0A08A;
  --border:    #E0CEB4;
  --card:      rgba(255,252,246,0.82);
  --white:     #FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Noto Sans TC',sans-serif;background:var(--ivory);color:var(--text-dark)}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .55s ease;overflow:hidden;background:var(--ivory)}
.screen.active{opacity:1;pointer-events:all}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center}

/* ── BG ── */
.amb{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 65% 45% at 5% 0%,rgba(232,200,188,.32) 0%,transparent 60%),
             radial-gradient(ellipse 55% 40% at 97% 5%,rgba(212,168,85,.18) 0%,transparent 58%),
             radial-gradient(ellipse 45% 35% at 3% 98%,rgba(200,218,190,.18) 0%,transparent 55%),
             radial-gradient(ellipse 60% 45% at 97% 96%,rgba(232,200,188,.20) 0%,transparent 58%)}

/* ── TOP BAR ── */
.top-bar{flex-shrink:0;position:relative;z-index:10;text-align:center;padding:16px 20px 8px}
.top-bar-txt{font-size:10.5px;letter-spacing:.22em;color:var(--text-muted);display:inline-flex;align-items:center;gap:7px}
.dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:.7}

/* ════════════ HERO ════════════ */
#s-hero .scroll-body{position:relative;z-index:5;padding:0 24px 44px;align-items:center}
.hero-banner{width:calc(100% + 48px);margin:0 -24px;height:108px;flex-shrink:0;position:relative;overflow:hidden}
.hero-egg-wrap{position:relative;width:min(88vw,310px);height:auto;margin:8px auto 14px;flex-shrink:0}
.hero-glow{position:absolute;inset:-22px;background:radial-gradient(ellipse,rgba(212,168,85,.26) 0%,transparent 68%);border-radius:50%;animation:glowP 3.2s ease-in-out infinite}
@keyframes glowP{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.hero-egg-svg{width:100%;height:100%;animation:eggF 4s ease-in-out infinite;filter:drop-shadow(0 10px 22px rgba(176,120,50,.24))}
@keyframes eggF{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-9px) rotate(.8deg)}}

.hero-orn{text-align:center;font-size:13px;color:var(--gold-deep);letter-spacing:.3em;margin-bottom:10px}
.hero-kicker{text-align:center;font-size:11px;letter-spacing:.22em;color:var(--text-soft);margin-bottom:12px}
.hero-title{font-family:'Noto Serif TC',serif;font-size:clamp(22px,6vw,30px);font-weight:700;color:var(--text-dark);text-align:center;line-height:1.45;margin-bottom:14px;letter-spacing:.04em}
.hero-desc{font-size:14px;line-height:1.9;color:var(--text-mid);text-align:center;max-width:300px;margin:0 auto 14px}
.div-row{display:flex;align-items:center;gap:10px;width:200px;margin:0 auto 18px}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--linen),transparent)}
.orn{color:var(--gold-deep);letter-spacing:.25em;font-size:12px}
.stats{display:flex;gap:20px;justify-content:center;margin-bottom:24px}
.stat{text-align:center}
.stat-n{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:600;color:var(--gold-deep);display:block}
.stat-l{font-size:10px;color:var(--text-muted);letter-spacing:.1em;display:block;margin-top:2px}
.stat-sep{width:1px;height:32px;background:var(--border);align-self:center}

/* START button */
.btn-start{display:flex;align-items:center;justify-content:center;width:100%;max-width:290px;margin:0 auto 12px;padding:17px 28px;
  background:linear-gradient(135deg,#F0C870 0%,#D4A855 45%,#B88A3A 100%);
  color:#3A2008;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;
  letter-spacing:.14em;border:none;border-radius:50px;cursor:pointer;
  text-align:center;
  box-shadow:0 6px 24px rgba(196,144,50,.34),inset 0 1px 0 rgba(255,255,255,.28);
  transition:transform .2s,box-shadow .2s;-webkit-appearance:none;position:relative;overflow:hidden}
.btn-start::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);animation:shimmer 3.5s ease-in-out infinite 2s}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.btn-start:active{transform:scale(.97);box-shadow:0 3px 12px rgba(196,144,50,.3)}
.hero-note{text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:.08em}

/* ════════════ QUIZ ════════════ */
#s-quiz .scroll-body{position:relative;z-index:5;padding:14px 18px 40px;align-items:center}
.pips-wrap{width:100%;max-width:380px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.pips-label{font-size:11px;color:var(--text-muted);letter-spacing:.18em}
.pips{display:flex;gap:5px}
.pip{width:20px;height:3px;border-radius:2px;background:var(--linen);transition:background .3s,width .3s}
.pip.done{background:var(--gold);width:24px}
.pip.cur{background:var(--gold-line);width:28px}

/* question card */
.q-card{width:100%;max-width:380px;background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(224,206,180,.65);border-radius:22px;padding:26px 20px 22px;
  box-shadow:0 4px 26px rgba(140,104,72,.10),0 1px 4px rgba(140,104,72,.06)}

/* Q number — centred */
.q-num{font-size:10.5px;letter-spacing:.22em;color:var(--gold-deep);text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.q-num::before,.q-num::after{content:'✦';font-size:9px}

/* Q text — centred, larger, darker */
.q-text{font-family:'Noto Serif TC',serif;font-size:clamp(16px,4.5vw,19px);font-weight:600;color:var(--text-dark);text-align:center;line-height:1.7;margin-bottom:22px;letter-spacing:.02em}

/* options */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;background:rgba(255,252,246,.55);cursor:pointer;transition:border-color .22s,background .22s,transform .15s;text-align:left;width:100%;-webkit-appearance:none}
.opt:active{transform:scale(.985)}
.opt.sel{border-color:var(--gold);background:rgba(240,200,112,.12)}
.opt-ltr{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--text-mid);font-family:'Noto Serif TC',serif;transition:background .22s,color .22s}
.opt.sel .opt-ltr{background:var(--gold);color:#3A2008}
.opt-txt{font-size:14px;line-height:1.75;color:var(--text-dark);padding-top:5px}

/* nav */
.q-nav{display:flex;gap:10px;width:100%;max-width:380px;margin-top:18px}
.btn-back{padding:15px 20px;border:1.5px solid var(--border);border-radius:40px;background:transparent;
  font-size:14px;color:var(--text-soft);cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  text-align:center;transition:background .18s;-webkit-appearance:none;white-space:nowrap}
.btn-back:active{background:var(--parchment)}
.btn-next{flex:1;padding:15px;border:none;border-radius:40px;
  background:linear-gradient(135deg,#F0C870,#D4A855);color:#3A2008;
  font-size:15px;font-weight:600;font-family:'Noto Serif TC',serif;letter-spacing:.1em;
  cursor:pointer;text-align:center;transition:opacity .2s,transform .15s;-webkit-appearance:none;
  box-shadow:0 4px 14px rgba(196,144,50,.28)}
.btn-next:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-next:not(:disabled):active{transform:scale(.97)}

/* ════════════ LOADING ════════════ */
#s-loading{justify-content:center;align-items:center}
#s-loading .scroll-body{justify-content:center;align-items:center;gap:26px;padding:40px}
.load-eggs{display:flex;gap:16px;align-items:flex-end}
.load-egg{animation:lBounce 1.35s ease-in-out infinite}
.load-egg:nth-child(2){animation-delay:.18s}
.load-egg:nth-child(3){animation-delay:.36s}
@keyframes lBounce{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-13px);opacity:1}}
.load-txt{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--text-mid);letter-spacing:.15em;text-align:center}
.load-sub{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-align:center}

/* ════════════ RESULT ════════════ */
#s-result .scroll-body{position:relative;z-index:5;padding:0 0 48px;align-items:stretch}
.r-hero{position:relative;overflow:hidden;padding:26px 24px 22px;text-align:center;flex-shrink:0}
.r-hero-bg{position:absolute;inset:0;z-index:0}
.r-hero-in{position:relative;z-index:2}
.r-badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:10px;letter-spacing:.2em;margin-bottom:12px;font-family:'Noto Sans TC',sans-serif}
.r-egg{width:120px;height:142px;margin:0 auto 14px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.13))}
.r-orn{font-size:11px;letter-spacing:.28em;color:var(--gold-deep);margin-bottom:6px}
.r-type{font-family:'Noto Serif TC',serif;font-size:clamp(20px,5.5vw,26px);font-weight:700;color:var(--text-dark);margin-bottom:4px}
.r-tagline{font-size:12px;color:var(--text-soft);letter-spacing:.12em}

.cstrip{display:flex;height:5px;margin:0 18px 20px;border-radius:3px;overflow:hidden;flex-shrink:0}

.r-body{padding:0 18px}
.r-desc{font-size:14.5px;line-height:1.95;color:var(--text-dark);margin-bottom:20px;padding:18px;background:var(--card);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:18px;border:1px solid rgba(224,206,180,.55);text-align:center}

.sec-lbl{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.2em;color:var(--gold-deep);margin-bottom:10px;font-weight:500;justify-content:center}
.sec-lbl::before,.sec-lbl::after{content:'';display:block;height:1px;width:28px;background:var(--gold-line);opacity:.6}

.talisman-card{background:var(--card);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(224,206,180,.5);border-radius:16px;padding:16px 18px;margin-bottom:16px;text-align:center}
.talisman-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:var(--text-dark);margin-bottom:8px}
.talisman-why{font-size:13px;line-height:1.8;color:var(--text-mid)}

.upgrade-card{background:rgba(255,250,238,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,168,85,.3);border-radius:16px;padding:18px;margin-bottom:12px;text-align:center}
.upgrade-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:var(--text-dark);margin-bottom:8px}
.upgrade-txt{font-size:13px;line-height:1.8;color:var(--text-mid);margin-bottom:14px}

/* ALL CTAs — centred text */
.btn-cta{display:block;width:100%;padding:16px 20px;border-radius:40px;
  font-size:15px;font-weight:600;font-family:'Noto Serif TC',serif;letter-spacing:.08em;
  text-align:center;cursor:pointer;border:none;text-decoration:none;
  transition:transform .15s,box-shadow .15s;-webkit-appearance:none;margin-bottom:10px}
.btn-cta:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,#F0C870,#D4A855,#B88A3A);color:#3A2008;box-shadow:0 5px 18px rgba(196,144,50,.32)}
.btn-outline{background:rgba(255,252,246,.78);color:var(--text-mid);border:1.5px solid var(--border)!important;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn-retry{display:block;width:100%;padding:12px;background:none;border:none;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;text-align:center;letter-spacing:.08em;text-decoration:underline;text-underline-offset:4px;margin-top:4px;-webkit-appearance:none}

.safe-b{height:max(env(safe-area-inset-bottom,0px),16px);flex-shrink:0}
.fu{opacity:0;transform:translateY(14px);animation:fadeUp .5s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ── MOBILE READABILITY OVERRIDES ── */
@media (max-width: 430px) {
  .hero-title { font-size: 22px !important; line-height: 1.5 !important; }
  .hero-desc  { font-size: 13.5px !important; line-height: 1.85 !important; }
  .q-text     { font-size: 16px !important; line-height: 1.7 !important; }
  .opt-txt    { font-size: 13.5px !important; line-height: 1.7 !important; }
  .opt-ltr    { width: 28px !important; height: 28px !important; font-size: 13px !important; }
  .r-desc     { font-size: 14px !important; line-height: 1.9 !important; }
  .talisman-why { font-size: 13px !important; line-height: 1.8 !important; }
  .upgrade-txt  { font-size: 13px !important; line-height: 1.8 !important; }
  .btn-cta    { font-size: 14px !important; padding: 15px 18px !important; }
  .btn-start  { font-size: 14px !important; padding: 15px 22px !important; }
  .r-type     { font-size: 20px !important; }
  .talisman-name { font-size: 15px !important; }
  .upgrade-title  { font-size: 14px !important; }
  .stat-n     { font-size: 17px !important; }
  .pips-label { font-size: 11px !important; }
  .q-num      { font-size: 10px !important; }
  .sec-lbl    { font-size: 10px !important; }
  .top-bar-txt { font-size: 10px !important; }
  .load-txt   { font-size: 14px !important; }
  .load-sub   { font-size: 12px !important; }
}

/* High contrast text for readability */
.q-text     { color: #2E1E0E !important; }
.opt-txt    { color: #2E1E0E !important; }
.r-desc     { color: #2E1E0E !important; }
.talisman-why { color: #5A3E28 !important; }
.upgrade-txt  { color: #5A3E28 !important; }
.hero-title   { color: #2E1E0E !important; }

</style>
</head>

  return t&&EGG_PHOTO[t]?EGG_PHOTO[t]:'';
}

function startQuiz(){curQ=0;ans={};renderQ();show('s-quiz')}

function renderQ(){
  const q=QS[curQ],isLast=curQ===QS.length-1;
  document.getElementById('pipLabel').textContent=`題目 ${curQ+1} / ${QS.length}`;
  document.querySelectorAll('.pip').forEach((p,i)=>{p.className='pip';if(i<curQ)p.classList.add('done');else if(i===curQ)p.classList.add('cur')});
  const bb=document.getElementById('btnBack');
  bb.style.display=curQ>0?'block':'none';
  const bn=document.getElementById('btnNext');
  bn.textContent=isLast?'✦ 查看結果':'下一題 →';
  bn.disabled=!ans[curQ];
  const sel=ans[curQ];
  document.getElementById('qCard').innerHTML=`
    <div class="q-num">Q${q.n} · 七道直覺題</div>
    <div class="q-text">${q.t}</div>
    <div class="opts">${q.opts.map(o=>`
      <button class="opt${sel===o.l?' sel':''}" onclick="pick('${o.l}')">
        <span class="opt-ltr">${o.l}</span>
        <span class="opt-txt">${o.t}</span>
      </button>`).join('')}
    </div>`;
  document.querySelector('#s-quiz .scroll-body').scrollTop=0;
}

function pick(letter){
  ans[curQ]=letter;
  document.querySelectorAll('.opt').forEach(el=>{el.classList.remove('sel');if(el.querySelector('.opt-ltr').textContent===letter)el.classList.add('sel')});
  document.getElementById('btnNext').disabled=false;
}
function nextQ(){if(!ans[curQ])return;if(curQ<QS.length-1){curQ++;renderQ();}else calcResult()}
function prevQ(){if(curQ>0){curQ--;renderQ()}}

function calcResult(){
  show('s-loading');
  const sc={};Object.keys(RES).forEach(t=>sc[t]=0);
  QS.forEach((q,i)=>{const a=ans[i];if(!a)return;const s=q.sc[a];if(s){sc[s.m]=(sc[s.m]||0)+2;sc[s.s]=(sc[s.s]||0)+1}});
  let sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]),top=sorted[0][0];
  if(sorted.length>1&&sorted[0][1]===sorted[1][1]){const tb={};[3,4,6].forEach(i=>{const a=ans[i];if(!a)return;const s=QS[i].sc[a];if(s)tb[s.m]=(tb[s.m]||0)+1});const tbs=Object.entries(tb).sort((a,b)=>b[1]-a[1]);if(tbs.length)top=tbs[0][0]}
  setTimeout(()=>{renderResult(top);show('s-result');document.querySelector('#s-result .scroll-body').scrollTop=0},1800);
}
